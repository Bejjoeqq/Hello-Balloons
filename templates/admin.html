<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Balloon Game</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            color: #ff6b6b;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }
        
        .pin-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .pin-input {
            padding: 10px 15px;
            font-size: 1.2em;
            border: none;
            border-radius: 5px;
            margin: 0 10px;
            text-align: center;
            letter-spacing: 3px;
            width: 150px;
        }
        
        .btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            color: white;
            padding: 12px 25px;
            margin: 10px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }
        
        .data-section {
            display: none;
            margin-top: 30px;
        }
        
        .stats {
            background: rgba(52, 152, 219, 0.2);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .table-container {
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            color: white;
        }
        
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.9em;
        }
        
        th {
            background: rgba(255, 107, 107, 0.3);
            font-weight: bold;
            position: sticky;
            top: 0;
        }
        
        tr:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .type-bot {
            color: #feca57;
        }
        
        .type-normal {
            color: #48cae4;
        }
        
        .error-message {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            display: none;
        }
        
        .success-message {
            background: rgba(39, 174, 96, 0.2);
            border: 1px solid #27ae60;
            color: #27ae60;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
        
        .back-btn {
            background: linear-gradient(45deg, #2c3e50, #34495e);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Admin Panel</h1>
        
        <div class="pin-section">
            <h3>Enter PIN to access database</h3>
            <input type="password" class="pin-input" id="pin-input" placeholder="000000" maxlength="6">
            <button class="btn" onclick="verifyPin()">🔓 Access Data</button>
            <button class="btn back-btn" onclick="goHome()">🏠 Back to Game</button>
        </div>
        
        <div class="error-message" id="error-message"></div>
        
        <div class="data-section" id="data-section">
            <div class="success-message">
                ✅ Access granted! Showing all database records.
            </div>
            
            <div class="stats" id="stats">
                Loading statistics...
            </div>
            
            <div class="table-container">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Points</th>
                            <th>Type</th>
                            <th>Rages</th>
                            <th>Spikes</th>
                            <th>Eaten</th>
                            <th>Moves</th>
                            <th>Time</th>
                            <th>Created</th>
                            <th>Updated</th>
                        </tr>
                    </thead>
                    <tbody id="data-tbody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function verifyPin() {
            const pin = document.getElementById('pin-input').value;
            const errorDiv = document.getElementById('error-message');
            
            if (!pin) {
                showError('Please enter a PIN');
                return;
            }
            
            fetch('/admin_data', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ pin: pin })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    hideError();
                    showData(data.data, data.total_records);
                } else {
                    showError(data.message || 'Access denied');
                }
            })
            .catch(error => {
                showError('Error accessing data: ' + error);
            });
        }
        
        function showData(data, totalRecords) {
            // Hide PIN section and show data
            document.querySelector('.pin-section').style.display = 'none';
            document.getElementById('data-section').style.display = 'block';
            
            // Update stats
            const stats = document.getElementById('stats');
            const botCount = data.filter(item => item.type === 'bot').length;
            const normalCount = data.filter(item => item.type === 'normal').length;
            const maxScore = Math.max(...data.map(item => item.points));
            
            stats.innerHTML = `
                <h3>📊 Database Statistics</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 15px;">
                    <div><strong>Total Records:</strong> ${totalRecords}</div>
                    <div><strong>Human Players:</strong> ${normalCount}</div>
                    <div><strong>Bot Players:</strong> ${botCount}</div>
                    <div><strong>Highest Score:</strong> ${maxScore}</div>
                </div>
            `;
            
            // Populate table
            const tbody = document.getElementById('data-tbody');
            tbody.innerHTML = '';
            
            data.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.id}</td>
                    <td><strong>${item.name}</strong></td>
                    <td><strong>${item.points}</strong></td>
                    <td><span class="type-${item.type}">${item.type.toUpperCase()}</span></td>
                    <td>${item.rages}</td>
                    <td>${item.spikes}</td>
                    <td>${item.eaten}</td>
                    <td>${item.moves}</td>
                    <td>${item.time}</td>
                    <td>${formatDate(item.created_at)}</td>
                    <td>${formatDate(item.updated_at)}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('error-message').style.display = 'none';
        }
        
        function goHome() {
            window.location.href = '/';
        }
        
        // Enter key support for PIN input
        document.getElementById('pin-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyPin();
            }
        });
    </script>
</body>
</html>
